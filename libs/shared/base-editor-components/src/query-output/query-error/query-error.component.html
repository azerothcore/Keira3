@if (error) {
  <div class="alert alert-danger error-box mt-2">
    <table>
      <tr>
        <td>Error:</td>
        <td>
          <button class="btn btn-primary btn-sm" (click)="showTrace = !showTrace">
            {{ showTrace ? 'Hide trace' : 'Show trace' }}
          </button>
        </td>
      </tr>
      <tr>
        <td></td>
        <td>{{ showTrace ? error.stack : error.message }}</td>
      </tr>
      <tr>
        <td>Code:</td>
        <td>{{ error.code }}</td>
      </tr>
      <tr>
        <td>Errno:</td>
        <td>{{ error.errno }}</td>
      </tr>
      <tr>
        <td>SQL State:</td>
        <td>{{ error.sqlState }}</td>
      </tr>
    </table>
  </div>
}
