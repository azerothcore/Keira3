<keira-top-bar
  [selected]="handlerService.selected"
  [selectedName]="handlerService.selectedName"
  [isNew]="handlerService.isNew"
  [customScssClass]="handlerService.itemQualityScssClass"
/>

@if (lootId !== null) {
  <div class="container-fluid">
    @if (lootId === 0) {
      <div
        class="alert alert-info mt-2"
        [innerHTML]="
          'LOOT_TEMPLATE.SET_FIELD'
            | translate: { LOOT_FIELD: editorService.entityTemplateLootField, ENTITY_TABLE: editorService.entityTemplateTable }
        "
      ></div>
    }
    @if (editorService.loading) {
      <span [translate]="'LOADING'"></span>
    }
    @if (lootId > 0 && editorService.form && !!editorService.loadedEntityId && !editorService.loading) {
      <div>
        <keira-loot-editor [editorService]="editorService" />
      </div>
    }
  </div>
}
