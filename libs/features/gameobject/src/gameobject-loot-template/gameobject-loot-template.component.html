<keira-top-bar [selected]="handlerService.selected" [selectedName]="handlerService.selectedName" [isNew]="handlerService.isNew" />

@if (lootId !== null) {
  <div class="container-fluid">
    @if (lootId === 0 || (type !== 3 && type !== 25)) {
      <div class="content-block">
        <div
          class="alert alert-info mt-2"
          [innerHTML]="'LOOT_TEMPLATE.SET_FIELD_GO' | translate: { ENTITY_TABLE: editorService.entityTemplateTable }"
        ></div>
      </div>
    }
    @if (editorService.loading) {
      <span [translate]="'LOADING'"></span>
    }
    @if (lootId > 0 && (type === 3 || type === 25) && editorService.form && !!editorService.loadedEntityId && !editorService.loading) {
      <div>
        <keira-loot-editor [editorService]="editorService" />
      </div>
    }
  </div>
}
